<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eddi M Photography</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f2ed;
      color: #111;
      text-align: center;
    }
    .container {
      max-width: 500px;
      margin: auto;
      padding: 40px 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    p {
      color: #555;
      margin-bottom: 30px;
    }
    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }
    button {
      background: #c9a96e;
      color: white;
      border: none;
      font-weight: bold;
    }
    button:hover {
      background: #b8955c;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Check Availability</h1>
    <p>Photography • Video • Makeup for Events</p>

    <form name="event-inquiry" method="POST" data-netlify="true" action="/thank-you/index.html">
      <input type="hidden" name="form-name" value="event-inquiry">

      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="text" name="event" placeholder="Type of Event">
      <input type="date" name="date">
      <textarea name="message" placeholder="Tell me about your event"></textarea>

      <button type="submit">Check Availability</button>
    </form>
  </div>
</body>
</html>
